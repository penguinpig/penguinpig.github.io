name: Sync Notion Content

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_ID: ${{ vars.NOTION_ID || vars.NOTION_PAGE_ID }}
      OUTPUT_PATH: ${{ vars.OUTPUT_PATH || 'synced/notion-page.md' }}
      HUGO_CONTENT_ROOT: ${{ vars.HUGO_CONTENT_ROOT || 'content' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.150.0"
          extended: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Sync Notion content
        run: node ./scripts/notion-fetch.mjs

      - name: Commit synced source changes to master
        id: commit_source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add content
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync notion content"
          git push origin master
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build Hugo site
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
